<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oerlikon — When to Leave</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700&family=Instrument+Serif&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root {
      --bg: #171412;
      --surface: #211D1A;
      --surface-raised: #2A2522;
      --border: #362F2A;
      --text: #EDE6DB;
      --text-secondary: #A99E90;
      --text-muted: #635A50;
      --red: #DC3545;
      --red-soft: rgba(220, 53, 69, 0.12);
      --amber: #D4920A;
      --amber-soft: rgba(212, 146, 10, 0.10);
      --green: #2E9E5E;
      --green-soft: rgba(46, 158, 94, 0.08);
      --rose: #C44D6E;
      --rose-soft: rgba(196, 77, 110, 0.12);
      --tram-10-bg: #0066AB;
      --tram-51-bg: #C8102E;
      --platform-bg: #D4920A;
      --train-bg: #4A3F8A;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Bricolage Grotesque', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* Grain overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 1000;
      pointer-events: none;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 200px;
    }

    .container {
      max-width: 500px;
      margin: 0 auto;
      padding: 24px 20px 40px;
    }

    /* --- Header --- */

    .header {
      margin-bottom: 28px;
      animation: fadeSlideIn 0.6s ease-out both;
    }

    .clock-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .live-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s ease-in-out infinite;
    }

    .clock {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-secondary);
      letter-spacing: 0.04em;
    }

    .refresh-ring {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      margin-left: auto;
    }

    .refresh-ring circle {
      fill: none;
      stroke-width: 2;
    }

    .refresh-ring .track {
      stroke: var(--border);
    }

    .refresh-ring .progress {
      stroke: var(--text-muted);
      stroke-linecap: round;
      transform: rotate(-90deg);
      transform-origin: center;
      transition: stroke-dashoffset 1s linear;
    }

    /* --- Leaflet Map --- */

    #map {
      width: 100%;
      height: 220px;
      border-radius: 10px;
      border: 1px solid var(--border);
      margin-bottom: 20px;
      animation: fadeSlideIn 0.5s ease-out both;
      overflow: hidden;
      background: var(--surface);
      position: relative;
    }

    #map .leaflet-tile-pane { filter: sepia(0.08) brightness(0.9); }
    #map .leaflet-control-attribution {
      background: transparent !important;
      font-size: 7px !important;
      color: var(--text-muted) !important;
      opacity: 0.4;
      padding: 0 4px !important;
    }
    #map .leaflet-control-attribution a { color: var(--text-muted) !important; }

    .station-marker-wrapper {
      overflow: visible !important;
      background: none !important;
      border: none !important;
    }

    .station-marker { position: relative; width: 0; height: 0; }

    .station-dot {
      position: absolute;
      width: 11px;
      height: 11px;
      border-radius: 50%;
      top: -5.5px;
      left: -5.5px;
      border: 2px solid var(--text-secondary);
      background: var(--bg);
      transition: all 0.4s ease;
      z-index: 2;
      box-shadow: 0 0 0 3px rgba(23,20,18,0.85);
    }
    .station-dot-inner {
      position: absolute;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      top: 0;
      left: 0;
      background: transparent;
      transition: all 0.4s ease;
    }

    .station-marker[data-u="green"] .station-dot {
      background: var(--green);
      border-color: rgba(237,230,219,0.45);
      box-shadow: 0 0 0 3px rgba(23,20,18,0.6), 0 0 10px rgba(46,158,94,0.35);
    }
    .station-marker[data-u="amber"] .station-dot {
      background: var(--amber);
      border-color: rgba(237,230,219,0.45);
      box-shadow: 0 0 0 3px rgba(23,20,18,0.6), 0 0 10px rgba(212,146,10,0.35);
    }
    .station-marker[data-u="red"] .station-dot {
      background: var(--red);
      border-color: rgba(237,230,219,0.45);
      box-shadow: 0 0 0 3px rgba(23,20,18,0.5), 0 0 12px rgba(220,53,69,0.45);
    }
    .station-marker[data-u="red"] .station-dot-inner {
      animation: pulse 1s ease-in-out infinite;
      background: rgba(255,255,255,0.15);
    }
    .station-marker[data-u="none"] .station-dot {
      background: var(--text-muted);
      border-color: rgba(237,230,219,0.2);
      box-shadow: 0 0 0 3px rgba(23,20,18,0.85);
    }

    .station-info {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      white-space: nowrap;
      z-index: 1;
    }
    .station-info.right { left: 16px; }
    .station-info.left { right: 16px; text-align: right; }

    .station-name {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 11px;
      font-weight: 600;
      color: var(--text);
      line-height: 1;
      text-shadow: 0 1px 4px var(--bg), 0 0 10px var(--bg), 0 0 20px var(--bg), 0 0 30px var(--bg);
    }

    .station-dir {
      font-family: 'JetBrains Mono', monospace;
      font-size: 7.5px;
      color: var(--text-muted);
      line-height: 1.4;
      text-shadow: 0 1px 4px var(--bg), 0 0 10px var(--bg), 0 0 20px var(--bg);
    }

    .station-cd {
      font-family: 'JetBrains Mono', monospace;
      font-size: 15px;
      font-weight: 700;
      line-height: 1.3;
      transition: color 0.3s;
      text-shadow: 0 1px 4px var(--bg), 0 0 10px var(--bg), 0 0 20px var(--bg);
    }
    .station-cd[data-u="green"] { color: var(--green); }
    .station-cd[data-u="amber"] { color: var(--amber); }
    .station-cd[data-u="red"]   { color: var(--red); }
    .station-cd[data-u="none"]  { color: var(--text-muted); }

    /* --- Details toggle --- */

    .details-toggle {
      display: none;
    }

    #content {
      display: block;
    }

    /* --- Sections (detailed view) --- */

    .section {
      margin-bottom: 32px;
      animation: fadeSlideIn 0.6s ease-out both;
    }

    .section:nth-child(2) { animation-delay: 0.1s; }
    .section:nth-child(3) { animation-delay: 0.15s; }

    .section-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .buffer-control {
      display: inline-flex;
      align-items: center;
      gap: 0;
      margin-left: auto;
      border: 1px solid var(--border);
      border-radius: 5px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .buffer-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      font-weight: 700;
      width: 22px;
      height: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s, background 0.15s;
    }

    .buffer-btn:hover {
      color: var(--text);
      background: var(--surface-raised);
    }

    .buffer-btn:active {
      background: var(--border);
    }

    .buffer-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.62rem;
      font-weight: 500;
      color: var(--text-secondary);
      min-width: 28px;
      text-align: center;
      padding: 0 2px;
      font-variant-numeric: tabular-nums;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      height: 22px;
      line-height: 22px;
    }

    .section-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    .section-sublabel {
      font-size: 0.7rem;
      color: var(--text-muted);
      font-weight: 400;
    }

    /* --- Line badges --- */

    .line-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 36px;
      height: 24px;
      padding: 0 7px;
      border-radius: 5px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      font-weight: 700;
      color: #fff;
    }

    .line-badge.tram-10 { background: var(--tram-10-bg); }
    .line-badge.tram-51 { background: var(--tram-51-bg); }
    .line-badge.train {
      background: var(--train-bg);
      font-size: 0.7rem;
      min-width: 40px;
    }

    /* --- Departure rows --- */

    .departures {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .dep-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--surface);
      border-radius: 8px;
      transition: background 0.2s, transform 0.2s, opacity 0.3s;
      animation: rowReveal 0.45s ease-out both;
    }

    .dep-row:hover:not(.missed) {
      background: var(--surface-raised);
      transform: translateY(-1px);
    }

    .dep-row.missed {
      opacity: 0.45;
    }

    .dep-row.missed .dep-time {
      text-decoration: line-through;
      text-decoration-color: var(--rose);
    }

    .dep-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.92rem;
      font-weight: 500;
      color: var(--text);
      min-width: 44px;
      font-variant-numeric: tabular-nums;
    }

    .dep-delay {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
      font-weight: 500;
      color: var(--red);
      min-width: 24px;
    }

    .dep-platform {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 26px;
      height: 20px;
      padding: 0 5px;
      border-radius: 4px;
      background: rgba(212, 146, 10, 0.15);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
      font-weight: 700;
      color: var(--platform-bg);
    }

    .dep-dest {
      font-size: 0.75rem;
      color: var(--text-muted);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }

    .dep-travel {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      padding: 2px 6px;
      border-radius: 4px;
      border: 1px solid var(--border);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.62rem;
      font-weight: 500;
      color: var(--text-secondary);
      flex-shrink: 0;
      letter-spacing: 0.01em;
    }

    .dep-travel-fast {
      color: var(--green);
      border-color: rgba(46, 158, 94, 0.25);
    }

    /* --- The hero: countdown --- */

    .countdown {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      text-align: right;
      white-space: nowrap;
      padding: 3px 9px;
      border-radius: 6px;
      flex-shrink: 0;
    }

    .countdown-num {
      font-size: 1.15rem;
    }

    .countdown-unit {
      font-size: 0.6rem;
      font-weight: 500;
      opacity: 0.7;
      margin-left: 1px;
    }

    .countdown.green {
      color: var(--green);
      background: var(--green-soft);
    }

    .countdown.amber {
      color: var(--amber);
      background: var(--amber-soft);
    }

    .countdown.red {
      color: var(--red);
      background: var(--red-soft);
      animation: urgentPulse 1.5s ease-in-out infinite;
    }

    .countdown.rose {
      color: var(--rose);
      background: var(--rose-soft);
    }

    /* --- Train row (combined badge + platform) --- */

    .train-row .line-badge {
      flex-shrink: 0;
    }

    /* --- Footer --- */

    .footer {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-muted);
      text-align: center;
      margin-top: 24px;
      opacity: 0.6;
    }

    .no-deps {
      font-size: 0.8rem;
      color: var(--text-muted);
      padding: 12px;
      font-style: italic;
    }

    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    /* --- Animations --- */

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes rowReveal {
      from { opacity: 0; transform: translateX(-8px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.3; }
    }

    @keyframes urgentPulse {
      0%, 100% { background: var(--red-soft); }
      50%      { background: rgba(220, 53, 69, 0.25); }
    }

    @keyframes rowExit {
      to { opacity: 0; transform: translateX(12px); height: 0; padding: 0 12px; margin: 0; }
    }

    .dep-row.exiting {
      animation: rowExit 0.4s ease-in forwards;
      overflow: hidden;
    }

    .countdown-num, .countdown-unit {
      transition: none;
    }

    /* --- Menu bar mode (tighter layout for 420px dropdown) --- */
    body.menubar-mode {
      min-height: auto;
      overflow: hidden;
    }
    body.menubar-mode .container {
      padding: 14px 14px 20px;
    }
    body.menubar-mode .header {
      margin-bottom: 16px;
    }
    body.menubar-mode .transit-map {
      margin-bottom: 12px;
    }
    body.menubar-mode .section {
      margin-bottom: 20px;
    }
    body.menubar-mode .dep-row {
      padding: 6px 10px;
    }
    body.menubar-mode .footer {
      margin-top: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="clock-row">
        <div class="live-dot"></div>
        <div class="clock" id="clock"></div>
        <svg class="refresh-ring" viewBox="0 0 16 16">
          <circle class="track" cx="8" cy="8" r="6" />
          <circle class="progress" id="refresh-progress" cx="8" cy="8" r="6"
            stroke-dasharray="37.7" stroke-dashoffset="0" />
        </svg>
      </div>
    </header>

    <!-- Zürich map -->
    <div id="map"></div>

    <button class="details-toggle" id="details-toggle">
      <span class="toggle-icon">&#9656;</span> All departures
    </button>

    <div id="content"></div>

    <div class="footer" id="footer"></div>
  </div>

  <script>
    const TRAIN_STATION_ID = '8503006';
    const MAX_LEAD_MINUTES = 20;
    const MISSED_REMOVE_MINUTES = -3;
    const REFRESH_INTERVAL = 30000;
    const COUNTDOWN_TICK = 1000;

    // --- Per-section lead times (persisted in localStorage) ---

    const savedBuffers = JSON.parse(localStorage.getItem('buffers') || '{}');

    const TRAM_STATIONS = [
      {
        id: '8591063',
        label: 'Trams',
        sublabel: 'Bahnhof Ost',
        direction: 'Downtown',
        containerId: 'tram-bahnhof-ost',
        bufferKey: 'bahnhof-ost',
        leadTime: savedBuffers['bahnhof-ost'] ?? 7,
        lines: {
          '10': { css: 'tram-10', toward: 'Bahnhofplatz/HB' },
          '51': { css: 'tram-51', toward: 'Altstetten' },
        },
      },
      {
        id: '8591073',
        label: 'Trams',
        sublabel: 'Berninaplatz',
        direction: 'Oerlikon',
        containerId: 'tram-berninaplatz',
        bufferKey: 'berninaplatz',
        leadTime: savedBuffers['berninaplatz'] ?? 3,
        lines: {
          '10': { css: 'tram-10', toward: 'Flughafen' },
          '51': { css: 'tram-51', toward: 'Seebach' },
        },
      },
    ];

    const TRAIN_SECTION = {
      containerId: 'train-deps',
      bufferKey: 'trains',
      direction: 'Zürich HB',
      leadTime: savedBuffers['trains'] ?? 7,
    };

    function saveBuffers() {
      const obj = {};
      TRAM_STATIONS.forEach(s => obj[s.bufferKey] = s.leadTime);
      obj[TRAIN_SECTION.bufferKey] = TRAIN_SECTION.leadTime;
      localStorage.setItem('buffers', JSON.stringify(obj));
    }

    // Cached data from last fetch (for re-patching on buffer change)
    let lastTramResults = [];
    let lastTrains = [];

    let structureBuilt = false;

    // --- Clock + refresh ring ---

    let lastRefreshAt = Date.now();
    const RING_CIRCUMFERENCE = 37.7;

    function tickClock() {
      document.getElementById('clock').textContent =
        new Date().toLocaleTimeString('de-CH', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

      const elapsed = Date.now() - lastRefreshAt;
      const pct = Math.min(elapsed / REFRESH_INTERVAL, 1);
      const offset = RING_CIRCUMFERENCE * (1 - pct);
      const ring = document.getElementById('refresh-progress');
      if (ring) ring.setAttribute('stroke-dashoffset', offset);
    }
    tickClock();
    setInterval(tickClock, 1000);

    // --- Leaflet map ---

    function initMap() {
      const map = L.map('map', {
        zoomControl: false,
        attributionControl: true,
        dragging: false,
        scrollWheelZoom: false,
        doubleClickZoom: false,
        touchZoom: false,
        boxZoom: false,
        keyboard: false,
      });

      // Fit all three stations with padding
      map.fitBounds([
        [47.400, 8.536],
        [47.418, 8.554],
      ]);

      const r = window.devicePixelRatio > 1 ? '@2x.png' : '.png';
      L.tileLayer(`https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}${r}`, {
        subdomains: 'abcd',
        maxZoom: 20,
        attribution: '&copy; <a href="https://osm.org/copyright">OSM</a> &middot; <a href="https://carto.com">CARTO</a>',
      }).addTo(map);

      // Real OSM route geometries (simplified from OpenStreetMap Overpass API, ODbL)
      const off = 0.00012;

    if (typeof L !== 'undefined') initMap();

    // --- Helpers ---

    function formatTime(ts) {
      return new Date(ts * 1000).toLocaleTimeString('de-CH', { hour: '2-digit', minute: '2-digit' });
    }

    function getRealTimestamp(dep) {
      const prog = dep.stop.prognosis.departure;
      return prog ? Math.round(new Date(prog).getTime() / 1000) : dep.stop.departureTimestamp;
    }

    function depKey(dep, type) {
      const stationId = dep.stop.station?.id || '';
      return `${type}-${stationId}-${dep.number}-${dep.stop.departureTimestamp}`;
    }

    function minsUntilLeave(realTimestamp, leadTime) {
      const nowSec = Math.round(Date.now() / 1000);
      const leaveAtSec = realTimestamp - leadTime * 60;
      return Math.round((leaveAtSec - nowSec) / 60);
    }

    function leaveByInfo(realTimestamp, leadTime) {
      const m = minsUntilLeave(realTimestamp, leadTime);

      if (m < 0)   return { html: `<span class="countdown-num">${m}</span><span class="countdown-unit">min</span>`, css: 'red', missed: false };
      if (m <= 0)  return { html: '<span class="countdown-num">GO</span>', css: 'red', missed: false };
      if (m <= 3)  return { html: `<span class="countdown-num">${m}</span><span class="countdown-unit">min</span>`, css: 'amber', missed: false };
      return { html: `<span class="countdown-num">${m}</span><span class="countdown-unit">min</span>`, css: 'green', missed: false };
    }

    function getViableDeps(deps, leadTime) {
      return deps
        .filter(dep => {
          const m = minsUntilLeave(getRealTimestamp(dep), leadTime);
          return m > MISSED_REMOVE_MINUTES && m <= MAX_LEAD_MINUTES;
        })
        .sort((a, b) => getRealTimestamp(a) - getRealTimestamp(b));
    }

    // --- Fetchers ---

    async function fetchTrams(station) {
      const url = `https://transport.opendata.ch/v1/stationboard?id=${station.id}&limit=30&transportations[]=tram`;
      const res = await fetch(url);
      const data = await res.json();
      return data.stationboard.filter(dep => {
        const cfg = station.lines[dep.number];
        return cfg && dep.to.includes(cfg.toward);
      });
    }

    async function fetchTrains() {
      const url = `https://transport.opendata.ch/v1/stationboard?id=${TRAIN_STATION_ID}&limit=30`;
      const res = await fetch(url);
      const data = await res.json();
      return data.stationboard
        .filter(dep => {
          const stops = (dep.passList || []).map(s => s.station.name || '');
          return stops.some(s => s.includes('HB'));
        })
        .map(dep => {
          const hbStop = (dep.passList || []).find(s =>
            s.station.name && s.station.name.includes('HB')
          );
          const depTs = dep.stop.departureTimestamp;
          const hbArrTs = hbStop && hbStop.arrivalTimestamp;
          dep._travelMin = hbArrTs ? Math.round((hbArrTs - depTs) / 60) : null;
          return dep;
        });
    }

    // --- Transit map rendering ---

    function updateMapNode(nodeKey, urgency) {
      const markerId = nodeKey === 0 ? 'bhf-ost' : nodeKey === 1 ? 'berninaplatz' : 'trains';
      const marker = document.getElementById(`marker-${markerId}`);
      if (marker) marker.setAttribute('data-u', urgency);
    }

    function getStationUrgency(deps, leadTime) {
      const viable = getViableDeps(deps, leadTime)
        .filter(dep => !leaveByInfo(getRealTimestamp(dep), leadTime).missed);
      if (viable.length === 0) return { urgency: 'none', cdText: '\u2014' };
      const m = minsUntilLeave(getRealTimestamp(viable[0]), leadTime);
      const urgency = m <= 0 ? 'red' : m <= 3 ? 'amber' : 'green';
      const cdText = m <= 0 ? 'GO' : m + 'm';
      return { urgency, cdText };
    }

    function renderTransitMap() {
      const markerIds = ['bhf-ost', 'berninaplatz'];
      TRAM_STATIONS.forEach((station, i) => {
        const deps = lastTramResults[i] || [];
        const { urgency, cdText } = getStationUrgency(deps, station.leadTime);
        updateMapNode(i, urgency);
        const cd = document.getElementById(`marker-cd-${markerIds[i]}`);
        if (cd) { cd.textContent = cdText; cd.setAttribute('data-u', urgency); }
      });

      const { urgency, cdText } = getStationUrgency(lastTrains, TRAIN_SECTION.leadTime);
      updateMapNode('trains', urgency);
      const cd = document.getElementById('marker-cd-trains');
      if (cd) { cd.textContent = cdText; cd.setAttribute('data-u', urgency); }
    }

    // --- Build the initial DOM structure (only once) ---

    function bufferControlHTML(bufferKey, leadTime) {
      return `<span class="buffer-control" data-buffer="${bufferKey}">` +
        `<button class="buffer-btn" data-dir="-1">&minus;</button>` +
        `<span class="buffer-value">${leadTime}m</span>` +
        `<button class="buffer-btn" data-dir="1">&plus;</button>` +
        `</span>`;
    }

    function updateAllBufferDisplays(bufferKey, value) {
      document.querySelectorAll(`[data-buffer="${bufferKey}"] .buffer-value`).forEach(el => {
        el.textContent = value + 'm';
      });
      document.querySelectorAll(`[data-buffer="${bufferKey}"] .buf-val`).forEach(el => {
        el.textContent = value + 'm';
      });
    }

    function wireBufferControl(bufferKey, getSectionConfig) {
      const control = document.querySelector(`.buffer-control[data-buffer="${bufferKey}"]`);
      if (!control) return;
      control.querySelectorAll('.buffer-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const cfg = getSectionConfig();
          cfg.leadTime = Math.max(0, Math.min(30, cfg.leadTime + parseInt(btn.dataset.dir)));
          updateAllBufferDisplays(bufferKey, cfg.leadTime);
          saveBuffers();
          repatchAll();
          tickCountdowns();
        });
      });
    }

      const content = document.getElementById('content');

            <span class="section-sublabel">${station.sublabel}</span>
            ${bufferControlHTML(station.bufferKey, station.leadTime)}
          </div>
          <div class="departures" id="${station.containerId}"></div>
        </div>`;
      });
      html += `
        <div class="section" style="animation-delay:${0.1 + TRAM_STATIONS.length * 0.05}s">
          <div class="section-header">
            <span class="section-label">Trains to HB</span>
            <span class="section-sublabel">Bahnhof Oerlikon</span>
            ${bufferControlHTML(TRAIN_SECTION.bufferKey, TRAIN_SECTION.leadTime)}
          </div>
          <div class="departures" id="train-deps"></div>
        </div>`;
      content.innerHTML = html;

      // Wire detail section buffer controls
      TRAM_STATIONS.forEach((station, i) => {
        wireBufferControl(station.bufferKey, () => TRAM_STATIONS[i]);
      });
      wireBufferControl(TRAIN_SECTION.bufferKey, () => TRAIN_SECTION);

      // Detail sections always visible (toggle removed)

      structureBuilt = true;
    }

    // --- Create a single tram row element ---

    function createTramRow(dep, leadTime) {
      const scheduled = dep.stop.departureTimestamp;
      const delay = dep.stop.delay || 0;
      const realTs = getRealTimestamp(dep);
      const leave = leaveByInfo(realTs, leadTime);
      const key = depKey(dep, 'tram');
      const lineCss = `tram-${dep.number}`;

      const row = document.createElement('div');
      row.className = `dep-row${leave.missed ? ' missed' : ''}`;
      row.dataset.key = key;
      row.dataset.realTs = realTs;
      row.dataset.lead = leadTime;
      row.innerHTML =
        `<span class="line-badge ${lineCss}">${dep.number}</span>` +
        `<span class="dep-time">${formatTime(scheduled)}</span>` +
        `<span class="dep-delay">${delay > 0 ? `+${delay}` : ''}</span>` +
        `<span class="dep-dest">${dep.to}</span>` +
        `<span class="countdown ${leave.css}">${leave.html}</span>`;
      row.style.animation = 'rowReveal 0.45s ease-out both';
      return row;
    }

    // --- Create a single train row element ---

    function createTrainRow(dep, leadTime) {
      const scheduled = dep.stop.departureTimestamp;
      const delay = dep.stop.delay || 0;
      const realTs = getRealTimestamp(dep);
      const leave = leaveByInfo(realTs, leadTime);
      const key = depKey(dep, 'train');
      const platform = dep.stop.platform || '?';
      const label = `${dep.category.trim()}${dep.number}`;
      const travelMin = dep._travelMin;

      const row = document.createElement('div');
      row.className = `dep-row train-row${leave.missed ? ' missed' : ''}`;
      row.dataset.key = key;
      row.dataset.realTs = realTs;
      row.dataset.lead = leadTime;

      let inner =
        `<span class="line-badge train">${label}</span>` +
        `<span class="dep-time">${formatTime(scheduled)}</span>` +
        `<span class="dep-delay">${delay > 0 ? `+${delay}` : ''}</span>` +
        `<span class="dep-platform">${platform}</span>`;
      if (travelMin) {
        const fastest = travelMin <= 5;
        inner += `<span class="dep-travel${fastest ? ' dep-travel-fast' : ''}">${travelMin}m</span>`;
      }
      inner +=
        `<span class="dep-dest">${dep.to}</span>` +
        `<span class="countdown ${leave.css}">${leave.html}</span>`;

      row.innerHTML = inner;
      row.style.animation = 'rowReveal 0.45s ease-out both';
      return row;
    }

    // --- Diff and patch a departures container ---

    function patchContainer(container, newDeps, createRowFn, type, leadTime) {
      // Clear stale exiting rows to prevent duplicates on re-patch
      container.querySelectorAll('.dep-row.exiting').forEach(r => r.remove());

      const newKeys = new Set(newDeps.map(d => depKey(d, type)));
      const existingRows = container.querySelectorAll('.dep-row');
      const existingKeyMap = new Map();
      existingRows.forEach(row => existingKeyMap.set(row.dataset.key, row));

      existingKeyMap.forEach((row, key) => {
        if (!newKeys.has(key)) {
          row.classList.add('exiting');
          row.addEventListener('animationend', () => row.remove(), { once: true });
        }
      });

      let prevRow = null;
      for (const dep of newDeps) {
        const key = depKey(dep, type);
        let row = existingKeyMap.get(key);

        if (!row) {
          row = createRowFn(dep, leadTime);
          if (prevRow && prevRow.nextSibling) {
            container.insertBefore(row, prevRow.nextSibling);
          } else if (!prevRow) {
            container.prepend(row);
          } else {
            container.appendChild(row);
          }
        } else {
          row.dataset.realTs = getRealTimestamp(dep);
          row.dataset.lead = leadTime;
          const delay = dep.stop.delay || 0;
          const delayEl = row.querySelector('.dep-delay');
          if (delayEl) delayEl.textContent = delay > 0 ? `+${delay}` : '';

          const platEl = row.querySelector('.dep-platform');
          if (platEl) platEl.textContent = dep.stop.platform || '?';

          row.style.animation = 'none';
        }
        prevRow = row;
      }

      if (newDeps.length > 0) {
        const noDeps = container.querySelector('.no-deps');
        if (noDeps) noDeps.remove();
      } else if (!container.querySelector('.no-deps') && container.querySelectorAll('.dep-row:not(.exiting)').length === 0) {
        container.innerHTML = '<p class="no-deps">No departures</p>';
      }
    }

    // --- Update all countdowns (runs every second) ---

    function tickCountdowns() {
      document.querySelectorAll('.dep-row:not(.exiting)').forEach(row => {
        const realTs = parseInt(row.dataset.realTs);
        const lead = parseInt(row.dataset.lead) || 7;
        if (!realTs) return;

        const m = minsUntilLeave(realTs, lead);
        if (m <= MISSED_REMOVE_MINUTES) {
          row.classList.add('exiting');
          row.addEventListener('animationend', () => row.remove(), { once: true });
          return;
        }

        const leave = leaveByInfo(realTs, lead);
        const cd = row.querySelector('.countdown');
        if (!cd) return;

        cd.className = `countdown ${leave.css}`;
        cd.innerHTML = leave.html;

        if (leave.missed && !row.classList.contains('missed')) {
          row.classList.add('missed');
        } else if (!leave.missed && row.classList.contains('missed')) {
          row.classList.remove('missed');
        }
      });

      // Also tick the transit map
      renderTransitMap();
    }

    // --- Re-patch all sections from cached data ---

    function repatchAll() {
      TRAM_STATIONS.forEach((station, i) => {
        if (!lastTramResults[i]) return;
        const lt = station.leadTime;
        const container = document.getElementById(station.containerId);
        if (!container) return;
        patchContainer(container, getViableDeps(lastTramResults[i], lt), createTramRow, 'tram', lt);
      });

      const trainLt = TRAIN_SECTION.leadTime;
      const trainContainer = document.getElementById('train-deps');
      if (trainContainer && lastTrains.length) {
        patchContainer(trainContainer, getViableDeps(lastTrains, trainLt), createTrainRow, 'train', trainLt);
      }

      renderTransitMap();
    }

    // --- Main ---

    async function update() {
      try {
        const tramFetches = TRAM_STATIONS.map(station => fetchTrams(station));
        const [trains, ...tramResults] = await Promise.all([fetchTrains(), ...tramFetches]);

        if (!structureBuilt) buildStructure();

        lastTramResults = tramResults;
        lastTrains = trains;

        repatchAll();

        lastRefreshAt = Date.now();
        document.getElementById('footer').textContent =
          `updated ${new Date().toLocaleTimeString('de-CH', { hour: '2-digit', minute: '2-digit', second: '2-digit' })}`;
      } catch (e) {
        if (!structureBuilt) {
          document.getElementById('footer').textContent = 'Failed to load. Retrying...';
        }
      }
    }

    update();
    setInterval(update, REFRESH_INTERVAL);
    setInterval(tickCountdowns, COUNTDOWN_TICK);

    // --- Menu bar integration (only active inside Electron) ---
    if (window.menubar && window.menubar.isMenuBar) {
      document.body.classList.add('menubar-mode');

      function pushTrayTitle() {
        const rows = document.querySelectorAll('.dep-row:not(.exiting):not(.missed)');
        let bestMins = null;
        for (const row of rows) {
          const ts = parseInt(row.dataset.realTs);
          const lead = parseInt(row.dataset.lead) || 7;
          if (!ts) continue;
          const m = minsUntilLeave(ts, lead);
          if (m <= -2) continue;
          if (bestMins === null || m < bestMins) bestMins = m;
        }

        if (bestMins === null) {
          window.menubar.updateTrayTitle('');
        } else if (bestMins <= 0) {
          window.menubar.updateTrayTitle('GO');
        } else {
          window.menubar.updateTrayTitle(`${bestMins}m`);
        }
      }

      setInterval(pushTrayTitle, 1000);
    }
  </script>
</body>
